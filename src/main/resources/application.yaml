spring:
  application:
    name: AIDemo

  data:
    redis:
      host: localhost
      port: 6379
  ai:
    vectorstore:
      redis:
        index-name: product-index
        prefix: product
        
    google:
      genai:
        api-key: ${GOOGLE_API_KEY}
        embedding:
          api-key: ${GOOGLE_API_KEY}
  main:
    allow-bean-definition-overriding: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    persist-authorization: true
